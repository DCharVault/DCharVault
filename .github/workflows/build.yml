name: Build DCharVault

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hpp'
      - '**.qml'
      - 'CMakeLists.txt'
      - '.github/workflows/**'

jobs:
  # JOB 1: LINUX (Ubuntu) - Qt 6.8.2 LTS
  build-linux:
    name: 🐧 Linux (Ubuntu)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgl1-mesa-dev libsodium-dev pkg-config

    - name: Install Qt 6.8.2
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.2'
        host: 'linux'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Package Linux (AppImage)
      run: |
        # Download linuxdeployqt
        wget -c -nv "https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage"
        chmod a+x linuxdeployqt-continuous-x86_64.AppImage
        
        # Create AppDir structure
        mkdir -p appdir/usr/bin
        mkdir -p appdir/usr/share/applications
        mkdir -p appdir/usr/share/icons/hicolor/256x256/apps
        
        # Print out the build directory contents for debugging just in case
        echo "--- COMPILED EXECUTABLES IN BUILD FOLDER ---"
        find build -type f -executable | grep -v "CMakeFiles" || true
        echo "--------------------------------------------"
        
        # Hunt down the executable using wildcards in case Qt named it 'appDCharVault'
        EXEC_PATH=$(find build -type f -executable -iname "*dcharvault*" | grep -v "CMakeFiles" | head -n 1)
        
        if [ -z "$EXEC_PATH" ]; then
          echo "Error: Executable still not found! Check the debug list above."
          exit 1
        fi
        
        echo "Found executable at: $EXEC_PATH"
        cp "$EXEC_PATH" appdir/usr/bin/DCharVault
        
        # Create a basic desktop file (Required for AppImage)
        cat <<EOF > appdir/usr/share/applications/dcharvault.desktop
        [Desktop Entry]
        Name=DCharVault
        Exec=DCharVault
        Icon=dcharvault
        Type=Application
        Categories=Utility;
        EOF
        
        # Create a dummy icon file to satisfy linuxdeployqt
        touch appdir/usr/share/icons/hicolor/256x256/apps/dcharvault.png
        
        # Run linuxdeployqt to bundle libsodium, Qt, and create the AppImage
        export VERSION=latest
        ./linuxdeployqt-continuous-x86_64.AppImage appdir/usr/share/applications/dcharvault.desktop -appimage -unsupported-allow-new-glibc
    
    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DCharVault-Linux
        path: DCharVault-*.AppImage
        retention-days: 1
      


  # JOB 2: WINDOWS (MSVC) - Qt 6.8.2 LTS
  build-windows:
    name: 🪟 Windows (MSVC)
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies (VCPKG)
      run: |
        vcpkg install --triplet x64-windows
        echo "SODIUM_ROOT_ENV=${{ github.workspace }}/vcpkg_installed/x64-windows" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install Qt 6.8.2
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.2'
        host: 'windows'
        arch: 'win64_msvc2022_64'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

    - name: Build
      run: cmake --build build --config Release

    - name: Package Windows (windeployqt)
      run: |
        mkdir deploy
        
        # Hunt down the executable wherever CMake hid it
        $exeFile = Get-ChildItem -Path build -Recurse -Filter "DCharVault.exe" | Select-Object -First 1
        $exePath = $exeFile.FullName
        Write-Host "Found executable at: $exePath"
        
        # Find the folder the exe is in, so we can grab the vcpkg DLLs next to it
        $exeDir = Split-Path $exePath
        
        # Copy the executable and any associated DLLs (like libsodium)
        Copy-Item -Path $exePath -Destination deploy\
        Copy-Item -Path "$exeDir\*.dll" -Destination deploy\ -ErrorAction SilentlyContinue
        
        # Run windeployqt to pull in all required Qt DLLs
        windeployqt deploy\DCharVault.exe

    - name: Zip Deployment Folder
      run: Compress-Archive -Path deploy\* -DestinationPath DCharVault-Windows.zip

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DCharVault-Windows
        path: DCharVault-Windows.zip
        retention-days: 1
      
  # JOB 3: ANDROID (ARM64) - Qt 6.8.2 LTS
  build-android:
    name: 🤖 Android (ARM64)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Tools
    
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential tar curl zip unzip autoconf autoconf-archive automake libtool

    # 1. Install Libsodium
    - name: Install Libsodium (VCPKG)
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh
        ./vcpkg/vcpkg install libsodium --triplet arm64-android --classic
        
        mkdir -p libs/arm64-v8a
        cp -r vcpkg/installed/arm64-android/include libs/arm64-v8a/
        mkdir -p libs/arm64-v8a/lib
        cp vcpkg/installed/arm64-android/lib/libsodium.a libs/arm64-v8a/lib/
        echo "SODIUM_ANDROID_ROOT_ENV=${{ github.workspace }}/libs" >> $GITHUB_ENV

    # 2. INSTALL HOST QT
    - name: Install Qt Host
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.2'
        host: 'linux'
        target: 'desktop'
        cache: true

    # 3. INSTALL TARGET QT
    - name: Install Qt Target
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.2'
        host: 'linux'
        target: 'android'
        arch: 'android_arm64_v8a'
        modules: 'qt5compat qtshadertools qtquick3d'
        cache: true
        

    # 3.5 Generate Android Keystore for Release Signing
    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore release.keystore -alias vaultkey -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=Vault,O=Dev,C=US"
        echo "KEYSTORE_PATH=$PWD/release.keystore" >> $GITHUB_ENV

  # 4. Configure CMake (RELEASE MODE)
    - name: Configure CMake
      run: |
        export QT_HOST_PATH=${{ runner.workspace }}/Qt/6.8.2/gcc_64 
        
        qt-cmake -B build -DCMAKE_BUILD_TYPE=Release \
        -DQT_ANDROID_BUILD_ALL_ABIS=OFF \
        -DANDROID_ABI=arm64-v8a \
        -DQT_HOST_PATH=$QT_HOST_PATH \
        -DQT_ANDROID_SIGN_APK=ON

    # 5. Build the APK (RELEASE MODE WITH SIGNING)
    - name: Build APK
      env:
        QT_ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
        QT_ANDROID_KEYSTORE_ALIAS: vaultkey
        QT_ANDROID_KEYSTORE_STORE_PASS: password123
        QT_ANDROID_KEYSTORE_KEY_PASS: password123
      run: cmake --build build --config Release

    # 6. UPLOAD ARTIFACT
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: DCharVault-Android
        path: build/**/*.apk
        if-no-files-found: error
        retention-days: 1
